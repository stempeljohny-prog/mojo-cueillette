<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2c2416">
<title>🌸 Cueillette – Mojo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf7f2;--surface:#fff;--surface2:#f5f0e8;
  --border:#e8dfd0;--text:#2c2416;--text2:#7a6d5a;
  --accent:#5c8a3c;--accent2:#8ab85a;
  --danger:#c0392b;--warning:#e67e22;
  --radius:14px;--shadow:0 2px 12px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* LOCK */
#lockScreen{position:fixed;inset:0;background:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:18px}
#lockScreen h2{font-family:'DM Serif Display',serif;font-size:2.2rem;color:#fff;font-weight:400}
#lockScreen p{font-size:.85rem;color:rgba(255,255,255,.45);margin-top:-10px}
.pin-dots{display:flex;gap:16px}
.pin-dot{width:15px;height:15px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:transparent;transition:background .15s}
.pin-dot.filled{background:#fff;border-color:#fff}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:12px;margin-top:4px}
.pin-btn{width:72px;height:72px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:#fff;font-family:'DM Sans',sans-serif;font-size:1.3rem;font-weight:500;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center}
.pin-btn:active{background:rgba(255,255,255,.22)}
.pin-error{color:#e74c3c;font-size:.82rem;min-height:20px;text-align:center}

/* APP */
header{background:var(--text);color:#fff;padding:14px 20px 10px;position:sticky;top:0;z-index:100;display:flex;align-items:center}
header h1{font-family:'DM Serif Display',serif;font-size:1.35rem;font-weight:400;flex:1}
.header-date{font-size:.72rem;color:rgba(255,255,255,.5)}
.sync-status{font-size:.68rem;padding:2px 8px;border-radius:10px;font-weight:500;margin-top:3px;white-space:nowrap}
.sync-status.ok{background:rgba(138,184,90,.25);color:#8ab85a}
.sync-status.syncing{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6)}
.sync-status.error{background:rgba(192,57,43,.25);color:#e74c3c}
.tabs{display:flex;background:var(--text);padding:0 16px 12px;gap:6px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,.25);color:rgba(255,255,255,.65);font-size:.82rem;font-weight:500;cursor:pointer;background:transparent;transition:all .2s}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
main{padding:16px;max-width:600px;margin:0 auto}

/* DATE TABS */
.date-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.date-tabs::-webkit-scrollbar{display:none}
.date-tab{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;font-size:.78rem;cursor:pointer;font-weight:500;white-space:nowrap;display:flex;align-items:center;gap:5px}
.date-tab.active{background:var(--text);border-color:var(--text);color:#fff}
.date-tab .del-date{font-size:.7rem;opacity:.6;padding:0 2px}
.date-tab-new{border-style:dashed;color:var(--accent);border-color:var(--accent2)}

/* BUDGET */
.budget-card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow);border:1px solid var(--border)}
.budget-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.budget-label{font-size:.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:.8px}
.budget-amount{font-family:'DM Serif Display',serif;font-size:2rem}
.budget-amount span{font-size:1rem;color:var(--text2)}
.budget-set{display:flex;align-items:center;gap:6px}
.budget-set label{font-size:.78rem;color:var(--text2)}
.budget-set input{width:75px;padding:6px 8px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.88rem;background:var(--bg);color:var(--text)}
.progress-bar{height:10px;background:var(--surface2);border-radius:10px;overflow:hidden;margin-top:10px}
.progress-fill{height:100%;border-radius:10px;transition:width .4s,background .3s;background:var(--accent)}
.progress-fill.warn{background:var(--warning)}
.progress-fill.over{background:var(--danger)}
.budget-sub{display:flex;justify-content:space-between;margin-top:6px;font-size:.78rem;color:var(--text2)}
.budget-remaining{font-weight:600}
.budget-remaining.over{color:var(--danger)}
.budget-remaining.warn{color:var(--warning)}
.budget-remaining.ok{color:var(--accent)}

/* SEARCH */
.search-bar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;margin-bottom:10px}
.search-bar input{flex:1;border:none;background:transparent;font-family:inherit;font-size:.9rem;color:var(--text)}
.search-bar input:focus{outline:none}
.section-title{font-size:.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.section-title button{font-size:.75rem;color:var(--accent);background:none;border:none;cursor:pointer;font-family:inherit;font-weight:600}

/* FLOWER ROWS */
.flower-list{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
.flower-row{background:var(--surface);border-radius:11px;padding:10px 12px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);border:1px solid var(--border);transition:border-color .2s}
.flower-row.has-qty{border-color:var(--accent2);background:#f7fbf3}
.flower-row.dragging{opacity:.35;background:var(--surface2)}
.flower-row.drag-over-h{border-color:var(--accent);border-style:dashed}
.harvest-handle{cursor:grab;color:#ccc;font-size:1.1rem;padding:0 2px;touch-action:none;user-select:none;flex-shrink:0}
.flower-info{flex:1;min-width:0}
.flower-name{font-weight:600;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.flower-price{font-size:.75rem;color:var(--text2)}

/* QTY */
.qty-ctrl{display:flex;align-items:center;background:var(--surface2);border-radius:9px;overflow:hidden;border:1px solid var(--border)}
.qty-btn{width:36px;height:38px;border:none;background:transparent;font-size:1.2rem;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;user-select:none}
.qty-btn:active{background:var(--border)}
.qty-input{width:46px;height:38px;text-align:center;border:none;background:transparent;font-family:inherit;font-size:.95rem;font-weight:700;color:var(--text);padding:0;-moz-appearance:textfield;appearance:textfield}
.qty-input::-webkit-outer-spin-button,.qty-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.qty-input:focus{outline:none;background:rgba(92,138,60,.08)}
.flower-subtotal{font-weight:700;font-size:.85rem;color:var(--accent);min-width:46px;text-align:right}
.flower-subtotal.zero{color:var(--border)}

/* FLORIST SELECTOR */
.florist-selector{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.florist-selector::-webkit-scrollbar{display:none}
.fs-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;font-size:.8rem;cursor:pointer;font-weight:500;transition:all .15s}
.fs-btn.active{background:var(--text);border-color:var(--text);color:#fff}

/* RÉCAP */
.summary-florist{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:10px;border:1px solid var(--border);box-shadow:var(--shadow)}
.sf-name{font-family:'DM Serif Display',serif;font-size:1.05rem;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.sf-total{font-size:.85rem;color:var(--accent);font-weight:700;font-family:'DM Sans',sans-serif}
.sf-row{display:flex;justify-content:space-between;font-size:.82rem;padding:3px 0;color:var(--text2)}
.sf-row span:last-child{color:var(--text);font-weight:500}
.sf-budget-bar{height:6px;background:var(--surface2);border-radius:6px;margin-top:8px;overflow:hidden}
.sf-budget-fill{height:100%;border-radius:6px;background:var(--accent)}
.sf-budget-fill.warn{background:var(--warning)}
.sf-budget-fill.over{background:var(--danger)}

/* CATALOGUE */
.catalog-row{background:var(--surface);border-radius:9px;padding:9px 12px;display:flex;align-items:center;gap:8px;border:1px solid var(--border);margin-bottom:5px;transition:background .15s}
.catalog-row input[type=text]{border:none;background:transparent;font-family:inherit;font-size:.88rem;color:var(--text);flex:1;min-width:0}
.catalog-row input[type=text]:focus{outline:none;border-bottom:1.5px solid var(--accent)}
.catalog-row input[type=number]{border:none;background:transparent;font-family:inherit;font-size:.88rem;font-weight:600;color:var(--accent);width:56px;text-align:right;-moz-appearance:textfield;appearance:textfield}
.catalog-row input[type=number]::-webkit-outer-spin-button,.catalog-row input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.del-btn{background:none;border:none;color:var(--danger);font-size:1rem;cursor:pointer;padding:4px;flex-shrink:0}

/* SELECTION par fleuriste dans Cueillette */
.flower-sel-row{background:var(--surface);border-radius:9px;padding:8px 12px;display:flex;align-items:center;gap:10px;border:1px solid var(--border);margin-bottom:5px;transition:background .15s}
.flower-sel-row.selected{background:#f0f8ea;border-color:var(--accent2)}
.check-toggle{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.check-toggle.on{background:var(--accent);border-color:var(--accent);color:#fff;font-size:.85rem}

.add-row{display:flex;gap:7px;margin-top:10px}
.add-row input{flex:1;padding:9px 11px;border:1.5px solid var(--border);border-radius:9px;font-family:inherit;font-size:.86rem;background:var(--surface);color:var(--text)}
.add-row input:focus{outline:none;border-color:var(--accent)}
.btn-add{padding:9px 14px;background:var(--accent);color:#fff;border:none;border-radius:9px;font-family:inherit;font-size:.86rem;font-weight:600;cursor:pointer;flex-shrink:0}
.florist-mgmt-row{background:var(--surface);border-radius:9px;padding:9px 12px;display:flex;align-items:center;gap:8px;border:1px solid var(--border);margin-bottom:5px}
.florist-mgmt-row input{flex:1;border:none;background:transparent;font-family:inherit;font-size:.88rem;color:var(--text)}
.florist-mgmt-row input:focus{outline:none;border-bottom:1.5px solid var(--accent)}
.save-section{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:14px;border:1px solid var(--border);box-shadow:var(--shadow)}
.save-title{font-size:.75rem;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-bottom:10px}
.btn-reset{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:11px;background:transparent;font-family:inherit;font-size:.86rem;color:var(--text2);cursor:pointer;margin-bottom:7px}
.btn-export{width:100%;padding:12px;border:none;border-radius:11px;background:var(--text);font-family:inherit;font-size:.86rem;color:#fff;font-weight:600;cursor:pointer;margin-bottom:7px}
.btn-import{width:100%;padding:12px;border:1.5px solid var(--accent);border-radius:11px;background:transparent;font-family:inherit;font-size:.86rem;color:var(--accent);font-weight:600;cursor:pointer;margin-bottom:7px}
.hint{font-size:.73rem;color:var(--text2);margin-bottom:10px;padding:8px 12px;background:var(--surface2);border-radius:8px;line-height:1.5}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:10px 20px;border-radius:20px;font-size:.84rem;transition:transform .3s;z-index:9998;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
.empty{text-align:center;color:var(--text2);font-size:.88rem;padding:30px 0}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* Sous-onglets sélection fleurs dans Cueillette */
.subtabs{display:flex;gap:0;margin-bottom:14px;background:var(--surface2);border-radius:10px;padding:3px}
.subtab{flex:1;padding:7px;border:none;background:transparent;border-radius:8px;font-family:inherit;font-size:.8rem;font-weight:500;cursor:pointer;color:var(--text2)}
.subtab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
</style>
</head>
<body>

<!-- LOCK -->
<div id="lockScreen">
  <h2>🌸 Mojo</h2>
  <p>Code d'accès</p>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-error" id="pinError"></div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <div></div>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn" onclick="pinDel()">⌫</button>
  </div>
</div>

<script>
const PIN_CODE='1312',PIN_KEY='mojo_auth';
let pinEntry='';
function checkAuth(){if(localStorage.getItem(PIN_KEY)==='ok')document.getElementById('lockScreen').style.display='none';}
function pinPress(d){
  if(pinEntry.length>=4)return;
  pinEntry+=d;
  document.getElementById('d'+(pinEntry.length-1)).classList.add('filled');
  if(pinEntry.length===4){
    if(pinEntry===PIN_CODE){localStorage.setItem(PIN_KEY,'ok');document.getElementById('lockScreen').style.display='none';}
    else{document.getElementById('pinError').textContent='Code incorrect';setTimeout(()=>{pinEntry='';[0,1,2,3].forEach(i=>document.getElementById('d'+i).classList.remove('filled'));document.getElementById('pinError').textContent='';},900);}
  }
}
function pinDel(){if(!pinEntry.length)return;document.getElementById('d'+(pinEntry.length-1)).classList.remove('filled');pinEntry=pinEntry.slice(0,-1);}
checkAuth();
</script>

</header>
<div class="tabs" id="tabBar"></div>
<main id="mainContent"><div class="spinner"></div></main>
<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyAx8HnXkoZ51Y6hbx0XDc1RqO8mw8qnawo",
  authDomain:"mojo-cueillette.firebaseapp.com",
  databaseURL:"https://mojo-cueillette-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"mojo-cueillette",
  storageBucket:"mojo-cueillette.firebasestorage.app",
  messagingSenderId:"154929802754",
  appId:"1:154929802754:web:f7b22385beee1d0356811b"
});
const db=getDatabase(app),ROOT='mojo';

// ── CATALOGUE ─────────────────────────────────────────────────────────
const MOJO_BASE=['Achillée mix','Achillée perle','Achillée ptarmica','Achillée filipendula','Ageratum','Agrostemma – Nielle','Alchemille','Allium','Alstroemere','Amarante grande','Ammi majus','Ammobium','Ancolie','Anémone','Aneth','Aster','Basilic','Bupleurum','Camomille','Campanule','Cameline','Célosie','Centaurée','Cosmos','Cotinus','Cresson','Cynoglossum','Dahlia géant','Dahlia moyen','Dahlia petit','Delphinium vivace grand','Delphinium annuel','Digitale','Echinacée','Eryngium','Euphorbe','Framboisier','Géum','Giroflée','Glaieul','Godetia','Gomphrena','Gypsophile annuel','Gypsophile vivace','Hypericum','Immortelle','Iris','Julienne des dames','Lavatère annuelle','Lavatère vivace','Lisianthus','Marguerite double','Menthe des montagnes','Muflier madame Butterfly','Muflier simple','Narcisse double grand','Narcisse simple petit','Nigelle','Oeillet de poète','Oeillet chabaud','Origan','Orlaya','Panicum Frosted Explosion','Phlox crème brûlée','Physocarpus','Pivoine','Renoncule','Rudbeckia','Saponaire','Sauge hormine','Sedum','Scabieuse annuelle','Scabieuse vivace','Solidago','Statice latifolium','Statice limonium',"Tagète oeillet d'inde","Tagète rose d'inde",'Tournesol petit','Tournesol gros','Tulipe double','Véronique','Zinnia gros','Zinnia petit'];
const MOJO_PRICES={'Achillée mix':0.60,'Achillée perle':0.70,'Achillée ptarmica':0.50,'Achillée filipendula':0.70,'Ageratum':0.50,'Agrostemma – Nielle':0.50,'Alchemille':0.50,'Allium':1.00,'Alstroemere':0.70,'Amarante grande':0.80,'Ammi majus':0.65,'Ammobium':0.55,'Ancolie':0.70,'Anémone':0.70,'Aneth':0.60,'Aster':0.70,'Basilic':0.60,'Bupleurum':0.70,'Camomille':0.70,'Campanule':0.90,'Cameline':0.60,'Célosie':0.70,'Centaurée':0.40,'Cosmos':0.60,'Cotinus':0.70,'Cresson':0.55,'Cynoglossum':0.60,'Dahlia géant':1.40,'Dahlia moyen':1.10,'Dahlia petit':0.80,'Delphinium vivace grand':1.00,'Delphinium annuel':0.80,'Digitale':0.80,'Echinacée':0.70,'Eryngium':0.85,'Euphorbe':0.70,'Framboisier':0.55,'Géum':0.50,'Giroflée':0.80,'Glaieul':1.00,'Godetia':0.65,'Gomphrena':0.40,'Gypsophile annuel':0.70,'Gypsophile vivace':0.90,'Hypericum':0.70,'Immortelle':0.70,'Iris':0.80,'Julienne des dames':0.60,'Lavatère annuelle':0.70,'Lavatère vivace':0.80,'Lisianthus':1.20,'Marguerite double':0.60,'Menthe des montagnes':0.60,'Muflier madame Butterfly':0.80,'Muflier simple':0.80,'Narcisse double grand':0.70,'Narcisse simple petit':0.50,'Nigelle':0.55,'Oeillet de poète':0.65,'Oeillet chabaud':0.60,'Origan':0.40,'Orlaya':0.60,'Panicum Frosted Explosion':0.35,'Phlox crème brûlée':0.50,'Physocarpus':0.55,'Pivoine':1.50,'Renoncule':0.80,'Rudbeckia':0.60,'Saponaire':0.60,'Sauge hormine':0.50,'Sedum':0.70,'Scabieuse annuelle':0.60,'Scabieuse vivace':0.70,'Solidago':0.70,'Statice latifolium':0.80,'Statice limonium':0.70,"Tagète oeillet d'inde":0.50,"Tagète rose d'inde":0.70,'Tournesol petit':0.80,'Tournesol gros':1.00,'Tulipe double':0.80,'Véronique':0.50,'Zinnia gros':0.70,'Zinnia petit':0.50};

function makeMojoFlowers(){
  return [...MOJO_BASE].sort((a,b)=>a.localeCompare(b,'fr')).map((name,i)=>({id:'f'+i,name,price:MOJO_PRICES[name]||0.60}));
}

const todayKey=()=>new Date().toISOString().slice(0,10);
const uid=()=>'x'+Math.random().toString(36).substr(2,8);

// ── STATE ─────────────────────────────────────────────────────────────
// Structure session :
// sessions[dateKey][floristId] = { selectedIds:[...], flowerOrder:[...], quantities:{flowerId: qty} }
function defaultState(){
  return {
    flowers: makeMojoFlowers(),   // catalogue global (sans active)
    florists: [{id:'c1',name:'Fleuriste 1',budget:100},{id:'c2',name:'Fleuriste 2',budget:100}],
    sessions: {},
    activeSession: todayKey(),
    activeFlorist: 'c1',
    activeTab: 'harvest',
    harvestSubTab: 'cueillette', // 'cueillette' | 'selection'
  };
}

let state=defaultState();
let saveTimer=null;

// ── FIREBASE ──────────────────────────────────────────────────────────
function setSyncStatus(s){
  const el=document.getElementById('syncStatus');if(!el)return;
  if(s==='ok'){el.textContent='✓ Synchronisé';el.className='sync-status ok';}
  else if(s==='syncing'){el.textContent='⟳ Synchro…';el.className='sync-status syncing';}
  else{el.textContent='⚠ Hors ligne';el.className='sync-status error';}
}
function pushToFirebase(){
  setSyncStatus('syncing');
  set(ref(db,ROOT),{flowers:state.flowers,florists:state.florists,sessions:state.sessions})
    .then(()=>setSyncStatus('ok')).catch(()=>setSyncStatus('error'));
}
function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(pushToFirebase,800);}

onValue(ref(db,ROOT),(snap)=>{
  try{
    const data=snap.val();
    if(!data){pushToFirebase();}
    else{
      if(data.flowers&&Array.isArray(data.flowers)) state.flowers=data.flowers;
      if(data.florists&&Array.isArray(data.florists)) state.florists=data.florists;
      if(data.sessions) state.sessions=sanitizeSessions(data.sessions);
    }
    setSyncStatus('ok');
  }catch(e){console.error(e);setSyncStatus('error');}
  renderMain();
},(err)=>{console.error(err);setSyncStatus('error');renderMain();});

function sanitizeSessions(sessions){
  const out={};
  Object.keys(sessions||{}).forEach(dk=>{
    out[dk]={};
    Object.keys(sessions[dk]||{}).forEach(fid=>{
      const fs=sessions[dk][fid]||{};
      out[dk][fid]={
        selectedIds: Array.isArray(fs.selectedIds)?fs.selectedIds:[],
        flowerOrder: Array.isArray(fs.flowerOrder)?fs.flowerOrder:[],
        quantities: fs.quantities||{},
      };
    });
  });
  return out;
}

// ── SESSION HELPERS ───────────────────────────────────────────────────
function getFloristSession(dateKey, floristId){
  if(!state.sessions[dateKey]) state.sessions[dateKey]={};
  if(!state.sessions[dateKey][floristId]){
    state.sessions[dateKey][floristId]={selectedIds:[],flowerOrder:[],quantities:{}};
  }
  const fs=state.sessions[dateKey][floristId];
  if(!fs.selectedIds) fs.selectedIds=[];
  if(!fs.flowerOrder) fs.flowerOrder=[];
  if(!fs.quantities) fs.quantities={};
  return fs;
}
function currentFS(){ return getFloristSession(state.activeSession, state.activeFlorist); }

function getQty(floristId, flowerId){
  const fs=getFloristSession(state.activeSession, floristId);
  return fs.quantities[flowerId]||0;
}

function setQty(floristId, flowerId, v){
  const fs=getFloristSession(state.activeSession, floristId);
  fs.quantities[flowerId]=Math.max(0,parseInt(v)||0);
  scheduleSave();
  const flower=state.flowers.find(f=>f.id===flowerId);
  const val=fs.quantities[flowerId];
  const sub=document.getElementById('sub_'+flowerId);
  const row=document.getElementById('row_'+flowerId);
  if(sub&&flower){sub.textContent=val>0?(val*flower.price).toFixed(2)+'€':'—';sub.className='flower-subtotal'+(val===0?' zero':'');if(row)row.className='flower-row'+(val>0?' has-qty':'');}
  updateBudgetBar(floristId, floristTotal(floristId));
}

function changeQty(fid,flid,d){const nv=Math.max(0,getQty(fid,flid)+d);const inp=document.getElementById('qty_'+flid);if(inp)inp.value=nv;setQty(fid,flid,nv);}

function floristTotal(floristId){
  const fs=getFloristSession(state.activeSession, floristId);
  return (state.flowers||[]).reduce((s,f)=>s+(fs.quantities[f.id]||0)*f.price,0);
}

// Fleurs sélectionnées pour ce fleuriste, dans leur ordre
function floristFlowerOrder(floristId){
  const fs=getFloristSession(state.activeSession, floristId);
  const selected=new Set(fs.selectedIds);
  const ordered=[];
  (fs.flowerOrder||[]).forEach(id=>{if(selected.has(id))ordered.push(id);});
  fs.selectedIds.forEach(id=>{if(!ordered.includes(id))ordered.push(id);});
  fs.flowerOrder=[...ordered];
  return ordered.map(id=>(state.flowers||[]).find(f=>f.id===id)).filter(Boolean);
}

function isSelected(floristId, flowerId){
  const fs=getFloristSession(state.activeSession, floristId);
  return (fs.selectedIds||[]).includes(flowerId);
}

function toggleSelection(floristId, flowerId){
  const fs=getFloristSession(state.activeSession, floristId);
  const idx=fs.selectedIds.indexOf(flowerId);
  if(idx>=0) fs.selectedIds.splice(idx,1);
  else fs.selectedIds.push(flowerId);
  scheduleSave(); renderMain();
}

function updateBudgetBar(floristId,total){
  const c=(state.florists||[]).find(x=>x.id===floristId);if(!c)return;
  const b=c.budget||0,pct=b>0?Math.min((total/b)*100,100):0,rem=b-total;
  const oc=total>b?'over':total>b*.85?'warn':'ok';
  const bc=total>b?'over':total>b*.85?'warn':'';
  const e=id=>document.getElementById(id);
  if(e('budgetAmt'))e('budgetAmt').textContent=total.toFixed(2);
  if(e('budgetFill')){e('budgetFill').style.width=pct+'%';e('budgetFill').className='progress-fill '+bc;}
  if(e('budgetRem')){e('budgetRem').textContent=rem>=0?'Reste '+rem.toFixed(2)+' €':'Dépassé de '+Math.abs(rem).toFixed(2)+' €';e('budgetRem').className='budget-remaining '+oc;}
  if(e('budgetPct'))e('budgetPct').textContent=pct.toFixed(0)+'% du budget';
}

function showToast(msg){const t=document.getElementById('toast');t.textContent='✓ '+(msg||'OK');t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);}

document.getElementById('headerDate').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});

// ── TABS ──────────────────────────────────────────────────────────────
function renderTabs(){
  document.getElementById('tabBar').innerHTML=[
    {id:'harvest',label:'🌿 Cueillette'},{id:'summary',label:'📋 Récap'},
    {id:'catalog',label:'✏️ Fleurs'},{id:'florists',label:'🏪 Fleuristes'},
    {id:'backup',label:'💾 Sauvegarde'},
  ].map(t=>`<button class="tab ${state.activeTab===t.id?'active':''}" onclick="window._tab('${t.id}')">${t.label}</button>`).join('');
}
window._tab=function(id){state.activeTab=id;renderTabs();renderMain();};

// ── DATE TABS ─────────────────────────────────────────────────────────
function formatDateKey(dk){const[y,m,d]=dk.split('-');return dk===todayKey()?'Aujourd\'hui':new Date(y,m-1,d).toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});}
function buildDateTabs(){
  const keys=Object.keys(state.sessions).sort((a,b)=>b.localeCompare(a));
  const today=todayKey();if(!keys.includes(today))keys.unshift(today);
  return `<div class="date-tabs">
    ${keys.map(dk=>`<button class="date-tab ${dk===state.activeSession?'active':''}" onclick="window._sess('${dk}')">
      ${formatDateKey(dk)}${dk!==today?`<span class="del-date" onclick="window._delSess(event,'${dk}')">✕</span>`:''}
    </button>`).join('')}
    <button class="date-tab date-tab-new" onclick="window._newSess()">+ Nouvelle date</button>
  </div>`;
}
window._sess=function(dk){state.activeSession=dk;renderMain();};
window._newSess=function(){state.activeSession=todayKey();renderMain();};
window._delSess=function(e,dk){e.stopPropagation();if(!confirm('Supprimer cette session ?'))return;delete state.sessions[dk];if(state.activeSession===dk)state.activeSession=todayKey();scheduleSave();renderMain();};

// ── HARVEST ───────────────────────────────────────────────────────────
function buildHarvest(){
  const florists=state.florists||[];
  const c=florists.find(x=>x.id===state.activeFlorist)||florists[0];
  if(!c)return'<div class="empty">Ajoutez un fleuriste dans 🏪</div>';
  state.activeFlorist=c.id;

  const floristSel=`<div class="florist-selector">${florists.map(x=>`<button class="fs-btn ${x.id===c.id?'active':''}" onclick="window._selF('${x.id}')">${x.name}</button>`).join('')}</div>`;
  const subTabs=`<div class="subtabs">
    <button class="subtab ${state.harvestSubTab==='cueillette'?'active':''}" onclick="window._hsub('cueillette')">🌿 Saisie</button>
    <button class="subtab ${state.harvestSubTab==='selection'?'active':''}" onclick="window._hsub('selection')">✓ Sélection</button>
  </div>`;

  if(state.harvestSubTab==='selection'){
    return buildDateTabs()+floristSel+subTabs+buildSelectionTab(c.id);
  }

  // Onglet saisie
  const ordered=floristFlowerOrder(c.id);
  if(!ordered.length) return buildDateTabs()+floristSel+subTabs+`
    <div class="empty" style="padding:30px 20px">
      <div style="font-size:2rem;margin-bottom:10px">🌸</div>
      <div style="font-weight:600;margin-bottom:6px">Aucune fleur sélectionnée</div>
      <div style="font-size:.84rem">Allez dans <strong>✓ Sélection</strong> pour choisir les variétés</div>
    </div>`;

  const total=floristTotal(c.id),b=c.budget||0;
  const pct=b>0?Math.min((total/b)*100,100):0,rem=b-total;
  const oc=total>b?'over':total>b*.85?'warn':'ok';
  const bc=total>b?'over':total>b*.85?'warn':'';

  const rows=ordered.map(f=>{
    const qty=getQty(c.id,f.id);
    return `<div class="flower-row${qty>0?' has-qty':''}" id="row_${f.id}"
        draggable="true" ondragstart="window._hds(event,'${f.id}')"
        ondragover="window._hdo(event,'${f.id}')" ondrop="window._hdd(event,'${f.id}')" ondragend="window._hde()">
      <span class="harvest-handle">⠿</span>
      <div class="flower-info"><div class="flower-name">${f.name}</div><div class="flower-price">${f.price.toFixed(2)} €/u</div></div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="window._cq('${c.id}','${f.id}',-1)">−</button>
        <input class="qty-input" id="qty_${f.id}" inputmode="numeric" pattern="[0-9]*" value="${qty}" onfocus="this.select()" onchange="window._sq('${c.id}','${f.id}',this.value)" onblur="window._sq('${c.id}','${f.id}',this.value)">
        <button class="qty-btn" onclick="window._cq('${c.id}','${f.id}',1)">+</button>
      </div>
      <div class="flower-subtotal${qty===0?' zero':''}" id="sub_${f.id}">${qty>0?(qty*f.price).toFixed(2)+'€':'—'}</div>
      <button onclick="window._removeFromF('${c.id}','${f.id}')" style="background:none;border:none;color:#ccc;font-size:.9rem;cursor:pointer;padding:2px 0 2px 4px;flex-shrink:0" title="Retirer">✕</button>
    </div>`;
  }).join('');

  return buildDateTabs()+floristSel+subTabs+`
    <div class="budget-card">
      <div class="budget-header">
        <div><div class="budget-label">Total — ${c.name}</div><div class="budget-amount"><span id="budgetAmt">${total.toFixed(2)}</span> <span>€</span></div></div>
        <div class="budget-set"><label>Budget</label><input type="number" value="${b}" min="0" step="5" onchange="window._sb('${c.id}',parseFloat(this.value)||0)"> €</div>
      </div>
      ${b>0?`<div class="progress-bar"><div class="progress-fill ${bc}" id="budgetFill" style="width:${pct}%"></div></div>
      <div class="budget-sub"><span id="budgetPct">${pct.toFixed(0)}% du budget</span><span class="budget-remaining ${oc}" id="budgetRem">${rem>=0?'Reste '+rem.toFixed(2)+' €':'Dépassé de '+Math.abs(rem).toFixed(2)+' €'}</span></div>`:''}
    </div>
    <div class="section-title">
      <span>${ordered.length} variété${ordered.length>1?'s':''}</span>
      <button onclick="window._resetSess()">Réinitialiser</button>
    </div>
    <div class="flower-list">${rows}</div>`;
}

// ── SOUS-ONGLET SÉLECTION PAR FLEURISTE ──────────────────────────────
function buildSelectionTab(floristId){
  const sorted=[...(state.flowers||[])].sort((a,b)=>a.name.localeCompare(b.name,'fr'));
  const selCount=getFloristSession(state.activeSession,floristId).selectedIds.length;

  const rows=sorted.map(f=>{
    const sel=isSelected(floristId,f.id);
    return `<div class="flower-sel-row${sel?' selected':''}">
      <div class="check-toggle ${sel?'on':''}" onclick="window._togSel('${floristId}','${f.id}')">${sel?'✓':''}</div>
      <span style="flex:1;font-size:.9rem;font-weight:${sel?600:400}">${f.name}</span>
      <span style="font-size:.78rem;color:var(--text2)">${f.price.toFixed(2)} €</span>
    </div>`;
  }).join('');

  return `<div class="hint">Cochez les fleurs disponibles <strong>pour ce fleuriste</strong> — indépendant des autres fleuristes.<br>${selCount} sélectionnée${selCount>1?'s':''} sur ${sorted.length}.</div>
    <div class="search-bar" style="margin-bottom:10px"><span>🔍</span>
      <input id="selSearch" placeholder="Rechercher…" oninput="window._fcs(this.value)" autocomplete="off" autocorrect="off" spellcheck="false">
      <button id="clearSelSearch" onclick="window._fcsc()" style="display:none;background:none;border:none;cursor:pointer;color:var(--text2)">✕</button>
    </div>
    <div class="section-title"><span>${sorted.length} variétés</span><button onclick="window._noneF('${floristId}')">Tout décocher</button></div>
    <div id="selList">${rows}</div>`;
}

window._fcs=function(q){
  const v=q.toLowerCase();
  document.querySelectorAll('#selList .flower-sel-row').forEach(r=>{
    const n=r.querySelector('span');if(!n)return;
    r.style.display=(!v||n.textContent.toLowerCase().includes(v))?'':'none';
  });
  const b=document.getElementById('clearSelSearch');if(b)b.style.display=v?'':'none';
};
window._fcsc=function(){const i=document.getElementById('selSearch');if(i){i.value='';i.focus();}window._fcs('');};
window._togSel=function(fid,flid){toggleSelection(fid,flid);};
window._noneF=function(fid){const fs=getFloristSession(state.activeSession,fid);fs.selectedIds=[];scheduleSave();renderMain();};
window._removeFromF=function(fid,flid){
  const fs=getFloristSession(state.activeSession,fid);
  fs.selectedIds=(fs.selectedIds||[]).filter(x=>x!==flid);
  fs.flowerOrder=(fs.flowerOrder||[]).filter(x=>x!==flid);
  delete fs.quantities[flid];
  scheduleSave();renderMain();
};
window._hsub=function(t){state.harvestSubTab=t;renderMain();};

window._selF=function(id){state.activeFlorist=id;renderMain();};
window._sb=function(fid,v){const c=(state.florists||[]).find(x=>x.id===fid);if(c){c.budget=v;scheduleSave();renderMain();}};
window._resetSess=function(){if(confirm('Remettre à zéro toutes les quantités ?')){currentFS().quantities={};scheduleSave();renderMain();}};
window._sq=setQty;window._cq=changeQty;

let _hDragId=null;
window._hds=function(e,id){_hDragId=id;e.dataTransfer.effectAllowed='move';setTimeout(()=>{const el=document.getElementById('row_'+id);if(el)el.classList.add('dragging');},0);};
window._hdo=function(e,id){e.preventDefault();document.querySelectorAll('.flower-row').forEach(r=>r.classList.remove('drag-over-h'));const el=document.getElementById('row_'+id);if(el)el.classList.add('drag-over-h');};
window._hdd=function(e,tid){
  e.preventDefault();if(!_hDragId||_hDragId===tid)return;
  const fs=currentFS();
  const order=floristFlowerOrder(state.activeFlorist).map(f=>f.id);
  const from=order.indexOf(_hDragId),to=order.indexOf(tid);
  if(from<0||to<0)return;
  order.splice(from,1);order.splice(to,0,_hDragId);
  fs.flowerOrder=order;scheduleSave();renderMain();
};
window._hde=function(){document.querySelectorAll('.flower-row').forEach(r=>{r.classList.remove('dragging');r.classList.remove('drag-over-h');});_hDragId=null;};

// ── SUMMARY ───────────────────────────────────────────────────────────
function buildSummary(){
  const allKeys=Object.keys(state.sessions||{}).sort((a,b)=>b.localeCompare(a));
  let html='',hasAny=false;
  allKeys.forEach(dk=>{
    const sessDate=state.sessions[dk]||{};
    const fd=(state.florists||[]).map(c=>{
      const fs=sessDate[c.id]||{quantities:{}};
      const qty=fs.quantities||{};
      const items=(state.flowers||[]).filter(f=>(qty[f.id]||0)>0);
      const total=(state.flowers||[]).reduce((s,f)=>s+(qty[f.id]||0)*f.price,0);
      return{c,items,total,qty};
    }).filter(x=>x.total>0);
    if(!fd.length)return;hasAny=true;
    const grand=fd.reduce((s,x)=>s+x.total,0);
    html+=`<div style="margin-bottom:20px">
      <div style="font-family:'DM Serif Display',serif;font-size:1rem;margin-bottom:8px;color:var(--text2)">${formatDateKey(dk)} — <strong style="color:var(--text)">${grand.toFixed(2)} €</strong></div>
      ${fd.map(({c,items,total,qty})=>{const b=c.budget||0,pct=b>0?Math.min((total/b)*100,100):0,bc=total>b?'over':total>b*.85?'warn':'';return`<div class="summary-florist"><div class="sf-name">${c.name}<span class="sf-total">${total.toFixed(2)} €${b>0?' / '+b.toFixed(0)+' €':''}</span></div>${items.map(f=>{const q=qty[f.id]||0;return`<div class="sf-row"><span>${f.name} × ${q}</span><span>${(q*f.price).toFixed(2)} €</span></div>`;}).join('')}${b>0?`<div class="sf-budget-bar"><div class="sf-budget-fill ${bc}" style="width:${pct}%"></div></div>`:''}</div>`;}).join('')}
    </div>`;
  });
  if(!hasAny)return'<div class="empty">Aucune quantité saisie</div>';
  return html+`<button class="btn-export" onclick="window._share()">📤 Partager la session en cours</button><button class="btn-reset" onclick="window._resetAll()">🗑 Réinitialiser toutes les sessions</button>`;
}

window._share=function(){
  const sessDate=state.sessions[state.activeSession]||{};
  const lines=(state.florists||[]).map(c=>{
    const fs=sessDate[c.id]||{quantities:{}};const qty=fs.quantities||{};
    const items=(state.flowers||[]).filter(f=>(qty[f.id]||0)>0);
    if(!items.length)return null;
    const total=items.reduce((s,f)=>s+(qty[f.id]||0)*f.price,0);
    return`${c.name}\n${items.map(f=>`  ${f.name} × ${qty[f.id]} = ${(qty[f.id]*f.price).toFixed(2)}€`).join('\n')}\nTotal: ${total.toFixed(2)}€`;
  }).filter(Boolean);
  const txt=`Cueillette ${formatDateKey(state.activeSession)}\n\n${lines.join('\n\n')}`;
  if(navigator.share)navigator.share({title:'Cueillette Mojo',text:txt});
  else navigator.clipboard.writeText(txt).then(()=>showToast('Copié !'));
};
window._resetAll=function(){if(confirm('Supprimer toutes les sessions ?')){state.sessions={};scheduleSave();renderMain();}};

window._fc=function(q){const v=q.toLowerCase();document.querySelectorAll('#catalogList .catalog-row').forEach(r=>{const n=r.querySelector('input[type=text]');if(n)r.style.display=(!v||n.value.toLowerCase().includes(v))?'':'none';});const b=document.getElementById('clearSearch');if(b)b.style.display=v?'':'none';};
window._fcc=function(){const i=document.getElementById('catalogSearch');if(i){i.value='';i.focus();}window._fc('');};
window._ef=function(id,k,v){const f=(state.flowers||[]).find(x=>x.id===id);if(f){f[k]=v;scheduleSave();}};

// ── FLEURISTES ────────────────────────────────────────────────────────
function buildFlorists(){
  return `<div class="section-title"><span>${(state.florists||[]).length} fleuriste(s)</span></div>
    ${(state.florists||[]).map(c=>`<div class="florist-mgmt-row"><span>🏪</span>
      <input value="${c.name}" onchange="window._efl('${c.id}','name',this.value)">
      <input style="width:65px;text-align:right;font-weight:600;color:var(--accent);-moz-appearance:textfield;appearance:textfield" type="number" value="${c.budget}" min="0" step="5" onchange="window._efl('${c.id}','budget',parseFloat(this.value)||0)"> €
      <button class="del-btn" onclick="window._dfl('${c.id}')">✕</button>
    </div>`).join('')}
    <div class="add-row" style="margin-top:12px">
      <input id="nflName" placeholder="Nom du fleuriste…">
      <input id="nflBudget" type="number" step="5" min="0" placeholder="100" style="width:75px;padding:9px 8px;border:1.5px solid var(--border);border-radius:9px;font-family:inherit;font-size:.86rem;background:var(--surface);color:var(--text);-moz-appearance:textfield;appearance:textfield">
      <button class="btn-add" onclick="window._afl()">+ Ajouter</button>
    </div>`;
}
window._efl=function(id,k,v){const c=(state.florists||[]).find(x=>x.id===id);if(c){c[k]=v;scheduleSave();}};
window._dfl=function(id){if((state.florists||[]).length<=1)return alert('Il faut au moins un fleuriste.');if(confirm('Supprimer ce fleuriste ?')){state.florists=state.florists.filter(c=>c.id!==id);if(state.activeFlorist===id)state.activeFlorist=(state.florists[0]||{}).id;scheduleSave();renderMain();}};
window._afl=function(){const name=document.getElementById('nflName').value.trim()||`Fleuriste ${(state.florists||[]).length+1}`;const budget=parseFloat(document.getElementById('nflBudget').value)||100;state.florists.push({id:uid(),name,budget});scheduleSave();renderMain();};

// ── SAUVEGARDE ────────────────────────────────────────────────────────
function buildBackup(){
  return `<div class="save-section"><div class="save-title">☁️ Firebase</div>
    <p style="font-size:.84rem;color:var(--text2);margin-bottom:14px;line-height:1.6">Synchronisation automatique entre tous les téléphones.</p>
    <button class="btn-export" onclick="pushToFirebase();showToast('Synchronisé !')">⟳ Forcer la synchronisation</button></div>
    <div class="save-section"><div class="save-title">💾 Sauvegarde locale</div>
    <p style="font-size:.84rem;color:var(--text2);margin-bottom:14px;line-height:1.6">Copie de secours à garder dans Google Drive.</p>
    <button class="btn-export" onclick="window._exp()">📥 Télécharger .json</button>
    <button class="btn-import" onclick="document.getElementById('importInput').click()">📂 Importer .json</button></div>
    <div class="save-section"><div class="save-title">🔒 Sécurité</div>
    <p style="font-size:.84rem;color:var(--text2);margin-bottom:14px;line-height:1.6">Se déconnecter pour redemander le code PIN.</p>
    <button class="btn-reset" onclick="window._lock()">🔒 Se déconnecter</button></div>
    <div class="save-section"><div class="save-title">⚠️ Réinitialisation</div>
    <button class="btn-reset" onclick="window._hard()">Réinitialiser complètement</button></div>`;
}
window._exp=function(){const blob=new Blob([JSON.stringify({flowers:state.flowers,florists:state.florists,sessions:state.sessions},null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`mojo-${todayKey()}.json`;a.click();URL.revokeObjectURL(url);showToast('Téléchargé !');};
window._importJSON=function(input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{try{const imp=JSON.parse(e.target.result);if(!imp.flowers||!imp.florists)throw new Error();if(confirm('Importer et écraser Firebase ?')){state.flowers=imp.flowers;state.florists=imp.florists;state.sessions=imp.sessions||{};pushToFirebase();renderMain();showToast('Importé !');}}catch(e){alert('Fichier invalide.');}};reader.readAsText(file);input.value='';};
window._lock=function(){localStorage.removeItem('mojo_auth');document.getElementById('lockScreen').style.display='flex';};
window._hard=function(){if(confirm('⚠️ Tout effacer y compris Firebase ?')){const s=defaultState();state.flowers=s.flowers;state.florists=s.florists;state.sessions={};pushToFirebase();renderMain();showToast('Réinitialisé');}};
window.pushToFirebase=pushToFirebase;
window.showToast=showToast;

// ── RENDER ────────────────────────────────────────────────────────────
function renderMain(){
  renderTabs();
  const m=document.getElementById('mainContent');
  const builders={harvest:buildHarvest,summary:buildSummary,catalog:buildCatalog,florists:buildFlorists,backup:buildBackup};
  try{m.innerHTML=(builders[state.activeTab]||buildHarvest)();}
  catch(e){console.error('Render error',e);m.innerHTML=`<div class="empty">Erreur d'affichage</div>`;}
}
window.renderMain=renderMain;
</script>
</body>
</html>
